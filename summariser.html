    <!-- ============================================ -->
    <!-- OFFLINE SUMMARISER ENGINE                    -->
    <!-- Pure JavaScript — no API needed              -->
    <!-- ============================================ -->
    <script>
        let selectedLength = 'short';

        // Common English stop words (filtered out from scoring)
        const STOP_WORDS = new Set([
            'a','an','the','and','or','but','if','then','so','because','as','of',
            'at','by','for','with','about','against','between','into','through',
            'during','before','after','above','below','to','from','up','down','in',
            'out','on','off','over','under','again','further','once','here','there',
            'when','where','why','how','all','any','both','each','few','more','most',
            'other','some','such','no','nor','not','only','own','same','than','too',
            'very','can','will','just','should','now','i','me','my','myself','we',
            'our','ours','ourselves','you','your','yours','yourself','yourselves',
            'he','him','his','himself','she','her','hers','herself','it','its',
            'itself','they','them','their','theirs','themselves','what','which',
            'who','whom','this','that','these','those','am','is','are','was','were',
            'be','been','being','have','has','had','having','do','does','did',
            'doing','would','could','should','may','might','must','shall','will'
        ]);

        /* ── Split text into sentences ── */
        function splitSentences(text) {
            // Handle abbreviations and edge cases
            const cleaned = text
                .replace(/([.!?])\s*(?=[A-Z])/g, "$1|")
                .replace(/\n+/g, ' ');
            return cleaned.split('|').map(s => s.trim()).filter(s => s.length > 10);
        }

        /* ── Extract words (lowercase, alphanumeric only) ── */
        function extractWords(text) {
            return text.toLowerCase()
                .replace(/[^a-z0-9\s]/g, ' ')
                .split(/\s+/)
                .filter(w => w.length > 2 && !STOP_WORDS.has(w));
        }

        /* ── Build word frequency map ── */
        function buildFrequency(words) {
            const freq = {};
            for (const word of words) {
                freq[word] = (freq[word] || 0) + 1;
            }

            // Normalise scores (divide by max)
            const max = Math.max(...Object.values(freq));
            for (const word in freq) {
                freq[word] = freq[word] / max;
            }
            return freq;
        }

        /* ── Score each sentence based on word importance ── */
        function scoreSentences(sentences, freq) {
            return sentences.map((sentence, index) => {
                const words = extractWords(sentence);
                if (words.length === 0) return { sentence, score: 0, index };

                let score = 0;
                for (const word of words) {
                    if (freq[word]) score += freq[word];
                }

                // Normalise by sentence length (avoid bias toward long sentences)
                score = score / Math.sqrt(words.length);

                // Slight boost for first & second sentences (often important)
                if (index === 0) score *= 1.2;
                if (index === 1) score *= 1.1;

                return { sentence, score, index };
            });
        }

        /* ── Main summarisation function ── */
        function summarise(text, ratio) {
            const sentences = splitSentences(text);
            if (sentences.length === 0) return '';
            if (sentences.length === 1) return sentences[0];

            const allWords = extractWords(text);
            const freq = buildFrequency(allWords);
            const scored = scoreSentences(sentences, freq);

            // Determine how many sentences to keep
            let keepCount = Math.max(1, Math.round(sentences.length * ratio));
            keepCount = Math.min(keepCount, sentences.length);

            // Sort by score, take top N
            const top = [...scored]
                .sort((a, b) => b.score - a.score)
                .slice(0, keepCount);

            // Restore original order
            top.sort((a, b) => a.index - b.index);

            return top.map(s => s.sentence).join(' ');
        }

        /* ── UI Helpers ── */
        function countWords(text) {
            const t = text.trim();
            if (!t) return 0;
            return t.split(/\s+/).length;
        }

        function countSentences(text) {
            return splitSentences(text).length;
        }

        function updateWordCount() {
            const text = document.getElementById('inputText').value;
            const words = countWords(text);
            const sents = countSentences(text);
            document.getElementById('wordCount').textContent =
                `${words} word${words !== 1 ? 's' : ''} · ${sents} sentence${sents !== 1 ? 's' : ''}`;
        }

        function setLength(btn) {
            document.querySelectorAll('.length-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedLength = btn.dataset.length;
        }

        function summariseText() {
            const text = document.getElementById('inputText').value.trim();
            const errorEl = document.getElementById('errorMsg');
            const output = document.getElementById('outputSection');

            errorEl.classList.remove('visible');
            output.classList.remove('visible');

            if (!text) {
                errorEl.textContent = '> error: no text provided';
                errorEl.classList.add('visible');
                return;
            }

            const sentenceCount = countSentences(text);
            if (sentenceCount < 2) {
                errorEl.textContent = '> error: need at least 2 sentences to summarise';
                errorEl.classList.add('visible');
                return;
            }

            // Determine ratio based on length setting
            const ratioMap = {
                short:    0.25,   // 25% of sentences
                medium:   0.5,    // 50% of sentences
                detailed: 0.75    // 75% of sentences
            };

            const summary = summarise(text, ratioMap[selectedLength]);

            if (!summary) {
                errorEl.textContent = '> error: could not generate summary';
                errorEl.classList.add('visible');
                return;
            }

            // Display output
            document.getElementById('outputText').textContent = summary;

            const originalWords = countWords(text);
            const summaryWords = countWords(summary);
            const reduction = Math.round((1 - summaryWords / originalWords) * 100);

            document.getElementById('outWords').textContent = summaryWords;
            document.getElementById('outReduction').textContent = reduction + '%';

            output.classList.add('visible');
            output.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputSection').classList.remove('visible');
            document.getElementById('errorMsg').classList.remove('visible');
            updateWordCount();
        }

        function copySummary() {
            const text = document.getElementById('outputText').textContent;
            const btn = document.getElementById('copyBtn');

            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('copied');
                btn.innerHTML = '<i class="fa-solid fa-check"></i> COPIED';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<i class="fa-solid fa-copy"></i> COPY';
                }, 2000);
            });
        }
    </script>
